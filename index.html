<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maafin Akuu 🥺</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #ffd9e6, #ffb3c6);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .container {
            background: rgba(255, 245, 250, 0.95);
            border-radius: 50px;
            padding: 30px 20px;
            box-shadow: 0 20px 30px rgba(255, 105, 180, 0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
            border: 3px solid white;
        }

        .avatar {
            font-size: 80px;
            margin-bottom: 5px;
        }

        h1 {
            font-size: 2.5rem;
            color: #ff3388;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0 #ffe4ec;
        }

        .plea-text {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ff4da6;
            background: white;
            padding: 15px;
            border-radius: 50px;
            margin: 15px 0;
            border: 2px solid #ff99cc;
            box-shadow: 0 5px 0 #ffb3c6;
        }

        .plea-text i {
            display: block;
            font-size: 1rem;
            color: #b34180;
            margin-top: 5px;
        }

        .message {
            background: #fff0f5;
            padding: 20px;
            border-radius: 30px;
            font-size: 1.2rem;
            color: #a13d63;
            margin: 20px 0;
            border: 2px solid white;
            line-height: 1.5;
        }

        .button-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0 15px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            padding: 15px 35px;
            font-size: 1.8rem;
            font-weight: bold;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 5px 0 #b3708c;
            min-width: 140px;
            border: 2px solid white;
            transition: 0.1s;
        }

        .btn.iya {
            background: #ffb3c6;
            color: white;
        }

        .btn.iya:active {
            transform: scale(0.95);
        }

        .btn.tidak {
            background: #ffe4ec;
            color: #ff4d6d;
            border: 2px solid #ff99bb;
            box-shadow: 0 4px 0 #ffb3c6;
            position: relative;
        }

        .yakin-container {
            margin: 15px 0;
        }

        .yakin-btn {
            background: #ffd966;
            color: #b34180;
            border: 3px solid white;
            padding: 15px 35px;
            font-size: 1.8rem;
            border-radius: 60px;
            font-weight: bold;
            box-shadow: 0 5px 0 #b38b40;
            cursor: pointer;
        }

        .hidden {
            display: none;
        }

        .response-message {
            background: #ffe0f0;
            border-radius: 40px;
            padding: 25px;
            margin-top: 20px;
            font-size: 1.5rem;
            color: #b34180;
            border: 3px dashed #ff99cc;
        }

        .response-message i {
            font-size: 3rem;
            display: block;
            margin-bottom: 10px;
        }

        footer {
            margin-top: 20px;
            color: #ff80b3;
            font-size: 0.9rem;
        }

        /* Animasi dikit biar gak lemot */
        .btn.iya {
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="avatar">🥺💗</div>
        <h1>MAFIN DONG</h1>
        
        <!-- KATA PLIS -->
        <div class="plea-text">
            🥺 Plis kasih aku kesempatan 🥺
            <i>plisplisplis 🥹</i>
        </div>

        <div class="message">
            "Aku janji bakal jadi lebih baik!<br>
            Kamu berharga banget buat aku 💕"
        </div>

        <!-- Tombol IYA & TIDAK -->
        <div class="button-group" id="buttonGroup">
            <button class="btn iya" id="iyaBtn">IYA 💖</button>
            <button class="btn tidak" id="tidakBtn">TIDAK 😭</button>
        </div>

        <!-- Tombol YAKIN? (hidden awal) -->
        <div id="yakinContainer" class="yakin-container hidden">
            <button class="yakin-btn" id="yakinBtn">YAKIN⁉️</button>
        </div>

        <!-- Pesan setelah IYA ditekan -->
        <div id="responseMessage" class="response-message hidden">
            <i>🥹💝💕</i>
            MAKASIH YA!<br>
            <span style="font-size: 1.2rem;">I LOVE YOU! 🤍</span>
        </div>

        <footer>dari orang yang paling nyesel 🥺</footer>
    </div>

    <script>
        // ========== NOMOR WHATSAPP ==========
        const WA_NUMBER = '085855557724';

        // ========== TOMBOL KABUR (VERSION RINGAN) ==========
        const tidakBtn = document.getElementById('tidakBtn');
        const iyaBtn = document.getElementById('iyaBtn');
        const yakinContainer = document.getElementById('yakinContainer');
        const yakinBtn = document.getElementById('yakinBtn');
        const responseMsg = document.getElementById('responseMessage');

        let tidakClickCount = 0;

        // Fungsi posisi random
        function getRandomPosition() {
            const maxX = window.innerWidth - 150;
            const maxY = window.innerHeight - 150;
            const x = Math.random() * maxX;
            const y = Math.random() * maxY;
            return { x, y };
        }

        // Tombol TIDAK kabur (sederhana)
        tidakBtn.addEventListener('mouseenter', function(e) {
            if (tidakClickCount < 3) {  // 3x kabur
                const pos = getRandomPosition();
                tidakBtn.style.position = 'fixed';
                tidakBtn.style.left = pos.x + 'px';
                tidakBtn.style.top = pos.y + 'px';
                tidakBtn.style.zIndex = '9999';
                tidakClickCount++;
            }
        });

        // Tombol TIDAK diklik
        tidakBtn.addEventListener('click', function(e) {
            e.preventDefault();
            
            if (tidakClickCount >= 3) {
                tidakBtn.style.display = 'none';
                yakinContainer.classList.remove('hidden');
            } else {
                alert(`Kesempatan ${3 - tidakClickCount}x lagi deh 😜`);
            }
        });

        // Tombol YAKIN kabur (lebih seru)
        yakinBtn.addEventListener('mouseenter', function(e) {
            const pos = getRandomPosition();
            yakinBtn.style.position = 'fixed';
            yakinBtn.style.left = pos.x + 'px';
            yakinBtn.style.top = pos.y + 'px';
            yakinBtn.style.zIndex = '9999';
        });

        // Kalau YAKIN diklik
        yakinBtn.addEventListener('click', function(e) {
            e.preventDefault();
            
            // WA
            const pesan = "Iya aku mau kasih kamu kesempatan 🥺💗";
            window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(pesan)}`, '_blank');
            
            // Sembunyikan tombol
            document.querySelectorAll('.btn, .yakin-btn').forEach(btn => {
                btn.style.display = 'none';
            });
            
            // Tampilkan pesan
            responseMsg.classList.remove('hidden');
        });

        // Tombol IYA (langsung WA)
        iyaBtn.addEventListener('click', function(e) {
            e.preventDefault();
            
            // WA
            const pesan = "Iya aku mau kasih kamu kesempatan 🥺💗";
            window.open(`https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(pesan)}`, '_blank');
            
            // Sembunyikan tombol
            document.querySelectorAll('.btn, .yakin-btn').forEach(btn => {
                btn.style.display = 'none';
            });
            
            // Tampilkan pesan
            responseMsg.classList.remove('hidden');
        });

        // Reset posisi saat resize
        window.addEventListener('resize', () => {
            tidakBtn.style.position = 'relative';
            tidakBtn.style.left = 'auto';
            tidakBtn.style.top = 'auto';
            if (yakinBtn) {
                yakinBtn.style.position = 'relative';
            }
        });
    </script>
</body>
</html>
